apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-api-gitops
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mruizm4/MLOPS-Proyectos-entrega-2.git
    targetRevision: argo-cd
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true