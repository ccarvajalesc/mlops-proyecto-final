# GitHub Actions Workflow - Build and Push Docker Images to DockerHub
# Este workflow se ejecuta automáticamente en cada push al repositorio
# Construye todas las imágenes Docker personalizadas y las publica en DockerHub

name: Build and Push Docker Images

permissions:
  contents: write

# Trigger: Se ejecuta en cada push a la rama main
on:
  push:
    branches:
      - 'main'  # Solo en la rama main

# Variables de configuración
env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: karabaharesu
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  # Job: Construir y publicar imágenes Docker
  build-and-push:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    
    strategy:
      # Matriz de servicios a construir
      # Cada servicio se construye en paralelo
      matrix:
        include:

          # Servicio 1: Airflow (Orquestación)
          - image_name: karabaharesu/mlops-final-airflow
            dockerfile: ./Dockerfile
            context: .

          # Servicio 2: API de Datos
          - image_name: karabaharesu/mlops-final-get-data-api
            dockerfile: ./api_datos/Dockerfile.api_datos
            context: ./api_datos

          # Servicio 3: API de Inferencia
          - image_name: karabaharesu/mlops-final-api-inference
            dockerfile: ./inference_api/Dockerfile.inference_api
            context: ./inference_api

          # Servicio 4: Streamlit UI
          - image_name: karabaharesu/mlops-final-streamlit-ui
            dockerfile: ./streamlit_ui/Dockerfile.streamlit_ui
            context: ./streamlit_ui

          # Servicio 5: Locust
          - image_name: karabaharesu/mlops-final-locust
            dockerfile: ./locust/Dockerfile.locust
            context: ./locust

          # Servicio 6: MLflow
          - image_name: karabaharesu/mlops-final-mlflow
            dockerfile: ./mlflow_compose/mlflow/Dockerfile
            context: ./mlflow_compose/mlflow

    # Pasos del workflow
    steps:
      # Paso 1: Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Paso 2: Configurar Docker Buildx (para mejor rendimiento de build)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paso 3: Autenticarse en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 4: Construir y publicar la imagen Docker
      # Usa buildx push para construir y publicar en un solo paso
      # Usa los nombres y versiones exactas de los manifiestos K8s
      - name: Build and push ${{ matrix.image_name }} (build ${{ github.run_number }})
        uses: docker/build-push-action@v5
        with:
          # Ruta al Dockerfile
          file: ${{ matrix.dockerfile }}
          # Contexto de build (archivos disponibles para COPY/ADD)
          context: ${{ matrix.context }}
          # Publicar la imagen tras construcción exitosa
          push: true
          # Etiquetas de la imagen (versión específica + latest)
          tags: |
            ${{ matrix.image_name }}:${{ env.IMAGE_TAG }}
          # Caché de capas Docker para acelerar builds posteriores
          cache-from: type=registry,ref=${{ matrix.image_name }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image_name }}:buildcache,mode=max

  # Job: Notificación de resultado (opcional)
  notify-completion:
    
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always() && !contains(github.event.head_commit.message, '[skip ci]')
    
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "✅ Todas las imágenes se construyeron y publicaron exitosamente en DockerHub"
            echo "📦 Imágenes disponibles en:"
            echo "   - karabaharesu/mlops-final-airflow:${{ github.run_number }}"
            echo "   - karabaharesu/mlops-final-get-data-api:${{ github.run_number }}"
            echo "   - karabaharesu/mlops-final-api-inference:${{ github.run_number }}"
            echo "   - karabaharesu/mlops-final-streamlit-ui:${{ github.run_number }}"
            echo "   - karabaharesu/mlops-final-locust:${{ github.run_number }}"
            echo "   - karabaharesu/mlops-final-mlflow:${{ github.run_number }}"
          else
            echo "❌ Error en la construcción o publicación de imágenes"
            exit 1
          fi

  update-manifests:
    needs: build-and-push
    if: needs.build-and-push.result == 'success'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update image tags
        run: |

          VERSION=${{ github.run_number }}

          # API Inference
          sed -i "s|karabaharesu/mlops-final-api-inference:.*|karabaharesu/mlops-final-api-inference:${VERSION}|g" \
          k8s/api_inference/api-inference-deployment.yaml

          # Get Data API
          sed -i "s|karabaharesu/mlops-final-get-data-api:.*|karabaharesu/mlops-final-get-data-api:${VERSION}|g" \
          k8s/get_data_api/get-data-api-deployment.yaml

          # Streamlit UI
          sed -i "s|karabaharesu/mlops-final-streamlit-ui:.*|karabaharesu/mlops-final-streamlit-ui:${VERSION}|g" \
          k8s/streamlit/streamlit-ui-deployment.yaml

          # Locust
          sed -i "s|karabaharesu/mlops-final-locust:.*|karabaharesu/mlops-final-locust:${VERSION}|g" \
          k8s/locust/locust-deployment.yaml

          # MLflow
          sed -i "s|karabaharesu/mlops-final-mlflow:.*|karabaharesu/mlops-final-mlflow:${VERSION}|g" \
          k8s/mlflow/mlflow-deployment.yaml

          # Airflow Scheduler
          sed -i "s|karabaharesu/mlops-final-airflow:.*|karabaharesu/mlops-final-airflow:${VERSION}|g" \
          k8s/airflow/airflow-scheduler-deployment.yaml

          # Airflow Worker
          sed -i "s|karabaharesu/mlops-final-airflow:.*|karabaharesu/mlops-final-airflow:${VERSION}|g" \
          k8s/airflow/airflow-worker-deployment.yaml

          # Airflow Webserver
          sed -i "s|karabaharesu/mlops-final-airflow:.*|karabaharesu/mlops-final-airflow:${VERSION}|g" \
          k8s/airflow/airflow-webserver-deployment.yaml

          # Airflow Triggerer
          sed -i "s|karabaharesu/mlops-final-airflow:.*|karabaharesu/mlops-final-airflow:${VERSION}|g" \
          k8s/airflow/airflow-triggerer-deployment.yaml

          # Airflow Init Job
          sed -i "s|karabaharesu/mlops-final-airflow:.*|karabaharesu/mlops-final-airflow:${VERSION}|g" \
          k8s/airflow/airflow-init-job.yaml

      - name: Commit changes
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/

          git diff --staged --quiet && exit 0

          git commit -m "ci: update image tags to build ${{ github.run_number }} [skip ci]"

          git push origin main
