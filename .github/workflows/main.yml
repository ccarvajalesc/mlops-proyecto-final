# GitHub Actions Workflow - Build and Push Docker Images to DockerHub
# Este workflow se ejecuta automáticamente en cada push al repositorio
# Construye todas las imágenes Docker personalizadas y las publica en DockerHub

name: Build and Push Docker Images

# Trigger: Se ejecuta en cada push a la rama argo-cd
on:
  push:
    branches:
      - 'argo-cd'  # Solo en la rama argo-cd

# Variables de configuración
env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: karabaharesu

jobs:
  # Job: Construir y publicar imágenes Docker
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      # Matriz de servicios a construir
      # Cada servicio se construye en paralelo
      # Los nombres de las imágenes se extraen directamente de los manifiestos K8s
      matrix:
        include:
          # Servicio 1: Airflow (Orchestración de pipelines)
          # Imagen usada en k8s: karabaharesu/mlops-airflow:latest
          - image_name: karabaharesu/mlops-airflow
            image_tag: latest
            dockerfile: ./Dockerfile
            context: .
            
          # Servicio 2: API de Datos (Obtención de datos)
          # Imagen usada en k8s: karabaharesu/get-data-api:1.0
          - image_name: karabaharesu/get-data-api
            image_tag: "1.0"
            dockerfile: ./api_datos/Dockerfile.api_datos
            context: ./api_datos
            
          # Servicio 3: API de Inferencia (Predicciones ML)
          # Imagen usada en k8s: karabaharesu/api-inference:2.0
          - image_name: karabaharesu/api-inference
            image_tag: "2.0"
            dockerfile: ./inference_api/Dockerfile.inference_api
            context: ./inference_api
            
          # Servicio 4: Streamlit UI (Interfaz de usuario)
          # Imagen usada en k8s: karabaharesu/streamlit-ui:1.0
          - image_name: karabaharesu/streamlit-ui
            image_tag: "1.0"
            dockerfile: ./streamlit_ui/Dockerfile.streamlit_ui
            context: ./streamlit_ui
            
          # Servicio 5: Locust (Testing de carga)
          # Imagen usada en k8s: karabaharesu/locust-custom:1.0
          - image_name: karabaharesu/locust-custom
            image_tag: "1.0"
            dockerfile: ./locust/Dockerfile.locust
            context: ./locust
            
          # Servicio 6: MLflow (Tracking de modelos)
          # Imagen usada en k8s: karabaharesu/mlflow-custom:2.0
          - image_name: karabaharesu/mlflow-custom
            image_tag: "2.0"
            dockerfile: ./mlflow_compose/mlflow/Dockerfile
            context: ./mlflow_compose/mlflow

    # Pasos del workflow
    steps:
      # Paso 1: Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Paso 2: Configurar Docker Buildx (para mejor rendimiento de build)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paso 3: Autenticarse en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 4: Construir y publicar la imagen Docker
      # Usa buildx push para construir y publicar en un solo paso
      # Usa los nombres y versiones exactas de los manifiestos K8s
      - name: Build and push ${{ matrix.image_name }} image (tag ${{ matrix.image_tag }})
        uses: docker/build-push-action@v5
        with:
          # Ruta al Dockerfile
          file: ${{ matrix.dockerfile }}
          # Contexto de build (archivos disponibles para COPY/ADD)
          context: ${{ matrix.context }}
          # Publicar la imagen tras construcción exitosa
          push: true
          # Etiquetas de la imagen (versión específica + latest)
          tags: |
            ${{ matrix.image_name }}:${{ matrix.image_tag }}
            ${{ matrix.image_name }}:latest
          # Caché de capas Docker para acelerar builds posteriores
          cache-from: type=registry,ref=${{ matrix.image_name }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image_name }}:buildcache,mode=max

  # Job: Notificación de resultado (opcional)
  notify-completion:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()  # Se ejecuta siempre, incluso si hay fallos
    
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "✅ Todas las imágenes se construyeron y publicaron exitosamente en DockerHub"
            echo "📦 Imágenes disponibles en:"
            echo "   - karabaharesu/mlops-airflow:latest"
            echo "   - karabaharesu/get-data-api:1.0"
            echo "   - karabaharesu/api-inference:2.0"
            echo "   - karabaharesu/streamlit-ui:1.0"
            echo "   - karabaharesu/locust-custom:1.0"
            echo "   - karabaharesu/mlflow-custom:2.0"
          else
            echo "❌ Error en la construcción o publicación de imágenes"
            exit 1
          fi
