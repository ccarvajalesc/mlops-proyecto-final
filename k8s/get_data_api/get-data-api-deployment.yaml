apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert -f docker-compose-k8s.yml -o k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: get-data-api
  name: get-data-api

spec:
  replicas: 1

  selector:
    matchLabels:
      io.kompose.service: get-data-api

  strategy:
    type: Recreate

  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert -f docker-compose-k8s.yml -o k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)

      labels:
        io.kompose.service: get-data-api

    spec:
      containers:
        - image: cristiandiaz13/mlops-puj:data-api-pf-v1
          imagePullPolicy: Always
          name: get-data-api

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"

            limits:
              memory: "2Gi"
              cpu: "1000m"

          ports:
            - containerPort: 80
              protocol: TCP

      restartPolicy: Always