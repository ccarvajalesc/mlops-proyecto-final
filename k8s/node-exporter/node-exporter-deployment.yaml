apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-exporter
  labels:
    app: node-exporter

spec:
  replicas: 1

  selector:
    matchLabels:
      app: node-exporter

  template:
    metadata:
      labels:
        app: node-exporter

    spec:
      containers:
        - name: node-exporter

          image: prom/node-exporter:v1.9.1

          ports:
            - containerPort: 9100
              protocol: TCP

          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"

            limits:
              memory: "128Mi"
              cpu: "250m"

          args:
            - "--path.rootfs=/host"

          volumeMounts:
            - name: root
              mountPath: /host
              readOnly: true

      volumes:
        - name: root
          hostPath:
            path: /

      restartPolicy: Always