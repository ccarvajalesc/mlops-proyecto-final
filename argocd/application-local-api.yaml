apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-api-gitops
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ccarvajalesc/mlops-proyecto-final.git
    targetRevision: main
    path: k8s

    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true